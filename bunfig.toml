telemetry = false
logLevel = "debug" # "debug" | "warn" | "error"

[console]
depth = 2

[install]
auto = "auto"
exact = true
# Optional deps must stay enabled — @tailwindcss/cli pulls in @parcel/watcher,
# which require()s a platform-specific prebuilt at module load. With
# optional = false the release build crashes on Bun 1.3.14+ with "No prebuild
# or local build of @parcel/watcher found". Earlier Bun versions tolerated
# this through side channels (e.g. bunx's lazy resolver), but the supported
# fix is to keep optional dependencies enabled.
optional = true
# Only install package versions published at least 3 days ago
minimumReleaseAge = 259200
# These packages will bypass the 3-day minimum age requirement
minimumReleaseAgeExcludes = ["@types/bun", "typescript"]

[run]
# equivalent to `bun --bun` for all `bun run` commands
bun = true

[test]
coverage = false
onlyFailures = true
preload = ["./src/test-setup.ts"]

[test.reporter]
dots = true

